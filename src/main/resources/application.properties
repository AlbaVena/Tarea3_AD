# configuracion ObjectDB en modo servidor
objectdb.url=objectdb://localhost:6136/circo.odb
objectdb.user=admin
objectdb.password=admin

#esto para excluir las entidades de ObjectDB:
spring.jpa.properties.hibernate.archive.autodetection=class,hbm
spring.jpa.properties.hibernate.exclude_jpa_packages=entidades.objectdb

# configuracion eXistDB
existdb.url=xmldb:exist://localhost:8080/exist/xmlrpc
existdb.collection=/db/informes
existdb.user=admin
existdb.password=admin

# configuracion MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/
#spring.data.mongodb.host=localhost
#spring.data.mongodb.port=27017
spring.data.mongodb.database=circodb
